services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=
        - NEXT_PUBLIC_WS_URL=/hubs
    container_name: ${COMPOSE_PROJECT_NAME:-smartcustomercore}-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_started
    networks:
      - smartcore-net

  backend:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production

  nginx:
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
      frontend:
        condition: service_started
