
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${COMPOSE_PROJECT_NAME:-smartcustomercore}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
      POSTGRES_DB: ${POSTGRES_DB:-smartcustomercore}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartcore} -d ${POSTGRES_DB:-smartcustomercore}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smartcore-net

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-smartcustomercore}-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - smartcore-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-smartcustomercore}-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-changeme_rabbitmq}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - smartcore-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: ${COMPOSE_PROJECT_NAME:-smartcustomercore}-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - smartcore-net

  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-smartcustomercore}-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - smartcore-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-smartcustomercore}-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:5000"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Username=${POSTGRES_USER:-smartcore};Password=${POSTGRES_PASSWORD:-changeme_postgres};Database=${POSTGRES_DB:-smartcustomercore}"
      Redis__ConnectionString: "redis:6379"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_DEFAULT_USER:-admin}"
      RabbitMQ__Password: "${RABBITMQ_DEFAULT_PASS:-changeme_rabbitmq}"
      Gemini__ApiKey: "${GEMINI_API_KEY}"
      JWT__ExpiryMinutes: "525600"
      WhatsAppGateway__Url: "http://whatsapp-gateway:3000"
      Elasticsearch__Url: "http://elasticsearch:9200"
      MinIO__Endpoint: "http://minio:9000"
      MinIO__AccessKey: "${MINIO_ROOT_USER:-minioadmin}"
      MinIO__SecretKey: "${MINIO_ROOT_PASSWORD:-changeme_minio}"
      MinIO__BucketName: "${MINIO_BUCKET:-smartcore-media}"
      MessageAggregation__MinDelayMs: "3000"
      MessageAggregation__MaxDelayMs: "6000"
      WhatsApp__MinTypingDelayMs: "1500"
      WhatsApp__MaxTypingDelayMs: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - smartcore-net

  whatsapp-gateway:
    build:
      context: ./whatsapp-gateway
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-smartcustomercore}-whatsapp-gateway
    restart: unless-stopped
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - BACKEND_URL=http://backend:5000
      - AUTO_RESTORE_SESSIONS=${AUTO_RESTORE_SESSIONS:-true}
    volumes:
      - ./whatsapp-gateway/sessions:/app/sessions
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smartcore-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_WS_URL: "/hubs"
    container_name: ${COMPOSE_PROJECT_NAME:-smartcustomercore}-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: "http://backend:5000"
    ports:
      - "${FRONTEND_PORT:-3002}:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - smartcore-net

  nginx:
    image: nginx:1.25-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-smartcustomercore}-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - smartcore-net

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  esdata:
  miniodata:

networks:
  smartcore-net:
    driver: bridge
